name: CI

on:
  push:
    branches: [master]
  pull_request:
    types: [ opened, reopened, synchronize ]
  workflow_run:
    workflows: ["Dependabot auto-merge"]
    types: [completed]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  build:
    # If this workflow was triggered by the automerge workflow completion, only
    # continue when that workflow run concluded successfully. For regular push
    # events the condition is ignored.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ '25' ]
    steps:
      - uses: actions/checkout@v7
      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: 'zulu'
      - name: Cache Maven packages
        uses: actions/cache@v6
        with:
          path: ~/.m2
          key: maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-
      - name: Aggressive cleanup
        run: |
          # Remove .NET SDKs
          sudo rm -rf /usr/share/dotnet

          # Remove Swift toolchain
          sudo rm -rf /usr/share/swift

          # Remove Haskell (GHC)
          sudo rm -rf /usr/local/.ghcup

          # Remove Julia
          sudo rm -rf /usr/local/julia*

          # Remove Android SDKs
          sudo rm -rf /usr/local/lib/android

          # Remove Chromium (optional if not using for browser tests)
          sudo rm -rf /usr/local/share/chromium

          # Remove Microsoft/Edge and Google Chrome builds
          sudo rm -rf /opt/microsoft /opt/google

          # Remove Azure CLI
          sudo rm -rf /opt/az

          # Remove PowerShell
          sudo rm -rf /usr/local/share/powershell
      - name: Run spotless check
        run: ./mvnw spotless:check
      - name: Build with Maven
        env:
          # Kotlin needs access to java.util
          MAVEN_OPTS: --add-opens java.base/java.util=ALL-UNNAMED
        run:  ./mvnw -e -Perror-prone,allure -Dmaven.build.cache.enabled=true validate test package
      - name: Publish Test Report
        uses: mikepenz/action-junit-report@v6
        if: always() # always run even if the previous step fails
        with:
          report_paths: '**/target/surefire-reports/TEST-*.xml'
          annotate_notice: false
          check_name: Test report ${{ matrix.java }}
      - name: Configure GitHub Pages
        id: pages
        uses: actions/configure-pages@v6
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
      - name: Restore Allure history
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        env:
          PAGES_BASE_URL: ${{ steps.pages.outputs.base_url }}
        run: |
          mkdir -p .allure/history/report

          curl --fail --silent --show-error --location "${PAGES_BASE_URL}/allure-history/history/report/history.jsonl" --output .allure/history/report/history.jsonl || true
      - name: Prepare Allure results
        if: always()
        run: |
          rm -rf target/allure-results
          mkdir -p target/allure-results

          find . -path '*/target/allure-results' -type d ! -path './target/allure-results' -print0 | while IFS= read -r -d '' results_dir; do
            cp -R "${results_dir}/." target/allure-results/
          done

          {
            echo "Java=${{ matrix.java }}"
            echo "OS=${{ runner.os }}"
            echo "Workflow=${{ github.workflow }}"
            echo "Run=${{ github.run_number }}"
            echo "Commit=${{ github.sha }}"
          } > target/allure-results/environment.properties
      - name: Generate Allure report
        if: always()
        env:
          # Kotlin needs access to java.util
          MAVEN_OPTS: --add-opens java.base/java.util=ALL-UNNAMED
        run: ./mvnw -N -e -Pallure -Dallure.install.directory=.allure allure:report
      - name: Persist Allure history
        if: always()
        run: |
          mkdir -p target/site/allure-maven-plugin/allure-history/history/report

          if [ -f .allure/history/report/history.jsonl ]; then
            cp .allure/history/report/history.jsonl target/site/allure-maven-plugin/allure-history/history/report/history.jsonl
          fi
      - name: Upload Allure report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-report-java-${{ matrix.java }}
          path: target/site/allure-maven-plugin
      - name: Upload Allure report for GitHub Pages
        uses: actions/upload-pages-artifact@v4
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          path: target/site/allure-maven-plugin

  deploy-allure:
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Allure report to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
